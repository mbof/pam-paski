<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pam-paski — Authenticate</title>
    <style>
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --border: #2a2d3a;
            --text: #e4e4e7;
            --text-dim: #9ca3af;
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --success: #22c55e;
            --error: #ef4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px;
            max-width: 460px;
            width: 100%;
            margin: 20px;
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .subtitle {
            color: var(--text-dim);
            font-size: 0.9rem;
            margin-bottom: 32px;
            line-height: 1.5;
        }
        label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-dim);
            margin-bottom: 6px;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 1rem;
            margin-bottom: 16px;
            outline: none;
            transition: border-color 0.2s;
            /* Enable passkey autofill */
            autocomplete: username webauthn;
        }
        input[type="text"]:focus {
            border-color: var(--accent);
        }
        button {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        button:hover { background: var(--accent-hover); }
        button:active { transform: scale(0.98); }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .status {
            margin-top: 20px;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.9rem;
            display: none;
        }
        .status.success {
            display: block;
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: var(--success);
        }
        .status.error {
            display: block;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: var(--error);
        }
        .status.info {
            display: block;
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.3);
            color: var(--accent-hover);
        }
        .logo {
            font-size: 2rem;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">🔐</div>
        <h1>Authenticate with Passkey</h1>
        <p class="subtitle">
            Use your enrolled passkey to verify your identity.
            This is a standalone test page for the pam-paski authentication flow.
        </p>

        <label for="username">Username</label>
        <input type="text" id="username" placeholder="your linux username" autocomplete="username webauthn" />

        <button id="auth-btn" onclick="startAuthentication()">
            Sign in with Passkey
        </button>

        <div id="status" class="status"></div>
    </div>

    <script>
        async function startAuthentication() {
            const btn = document.getElementById('auth-btn');
            const status = document.getElementById('status');
            const username = document.getElementById('username').value.trim();

            if (!username) {
                showStatus('error', 'Please enter your username');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Working…';
            showStatus('info', 'Starting authentication…');

            try {
                // Step 1: Get challenge from server
                const startResp = await fetch('/api/authenticate/start', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username }),
                });

                if (!startResp.ok) {
                    const err = await startResp.json();
                    throw new Error(err.message || 'Failed to start authentication');
                }

                const { session_token, options } = await startResp.json();

                showStatus('info', 'Waiting for your passkey…');

                // Step 2: Call the WebAuthn API
                const publicKeyOptions = prepareRequestOptions(options);
                const assertion = await navigator.credentials.get({
                    publicKey: publicKeyOptions,
                });

                showStatus('info', 'Verifying with server…');

                // Step 3: Send the assertion to the server
                const finishResp = await fetch('/api/authenticate/finish', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        session_token,
                        credential: serializeAssertion(assertion),
                    }),
                });

                if (!finishResp.ok) {
                    const err = await finishResp.json();
                    throw new Error(err.message || 'Authentication failed');
                }

                const result = await finishResp.json();
                showStatus('success', '✓ ' + result.message);
                btn.textContent = 'Authenticated ✓';

            } catch (err) {
                if (err.name === 'NotAllowedError') {
                    showStatus('error', 'Authentication was cancelled or timed out.');
                } else {
                    showStatus('error', 'Error: ' + err.message);
                }
                btn.disabled = false;
                btn.textContent = 'Sign in with Passkey';
            }
        }

        function showStatus(type, message) {
            const el = document.getElementById('status');
            el.className = 'status ' + type;
            el.textContent = message;
        }

        function prepareRequestOptions(options) {
            const publicKey = options.publicKey;
            publicKey.challenge = base64urlToBuffer(publicKey.challenge);
            if (publicKey.allowCredentials) {
                publicKey.allowCredentials = publicKey.allowCredentials.map(c => ({
                    ...c,
                    id: base64urlToBuffer(c.id),
                }));
            }
            return publicKey;
        }

        function serializeAssertion(assertion) {
            return {
                id: assertion.id,
                rawId: bufferToBase64url(assertion.rawId),
                type: assertion.type,
                response: {
                    authenticatorData: bufferToBase64url(assertion.response.authenticatorData),
                    clientDataJSON: bufferToBase64url(assertion.response.clientDataJSON),
                    signature: bufferToBase64url(assertion.response.signature),
                    userHandle: assertion.response.userHandle
                        ? bufferToBase64url(assertion.response.userHandle)
                        : null,
                },
                extensions: assertion.getClientExtensionResults?.() || {},
            };
        }

        function base64urlToBuffer(base64url) {
            const base64 = base64url.replace(/-/g, '+').replace(/_/g, '/');
            const pad = base64.length % 4;
            const padded = pad ? base64 + '='.repeat(4 - pad) : base64;
            const binary = atob(padded);
            const bytes = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) {
                bytes[i] = binary.charCodeAt(i);
            }
            return bytes.buffer;
        }

        function bufferToBase64url(buffer) {
            const bytes = new Uint8Array(buffer);
            let binary = '';
            for (const byte of bytes) {
                binary += String.fromCharCode(byte);
            }
            return btoa(binary).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
        }
    </script>
</body>
</html>
